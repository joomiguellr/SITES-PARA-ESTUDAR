<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Lex § Diário — Lei Seca</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231e3a5f'/%3E%3Ctext x='16' y='24' text-anchor='middle' fill='%23c8a96e' font-family='Georgia' font-size='22' font-weight='bold'%3E%C2%A7%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8f7f4;--bg2:#f0ede8;--wh:#fff;--navy:#1e3a5f;--navy2:#2a4f7e;
--gold:#c8a96e;--text:#2c3340;--text2:#5a6473;--text3:#9aa3ae;
--bdr:#e4dfd8;--bdr2:#edeae5;--grn:#2d7a4f;--grn-bg:#e8f5ee;
--org:#c47a1a;--org-bg:#fdf3e4;--org-bd:#e8c07a;--blu-bg:#e8eef6;
--rst:#f0ede8;--rst-t:#b0a89a;--r:8px;
--fs:'Lora',Georgia,serif;--fn:'DM Sans',system-ui,sans-serif}
html,body{height:100%;font-family:var(--fn);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
#hdr{position:sticky;top:0;z-index:200;background:var(--navy);height:56px;display:flex;align-items:center;
padding:0 0 0 14px;box-shadow:0 1px 6px rgba(0,0,0,.2);gap:0;overflow-x:auto;overflow-y:hidden}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-right:12px;border-right:1px solid rgba(255,255,255,.1)}
.logo-m{width:30px;height:30px;background:var(--gold);border-radius:5px;display:flex;align-items:center;justify-content:center;
font-family:var(--fs);font-size:19px;font-weight:600;color:var(--navy)}
.logo-t strong{display:block;font-family:var(--fs);font-size:13px;font-weight:500;color:#fff}
.logo-t span{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.07em;text-transform:uppercase}
.sbts{display:flex;gap:2px;padding:0 10px;border-right:1px solid rgba(255,255,255,.1);flex-shrink:0}
.sb{padding:4px 10px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:transparent;
color:rgba(255,255,255,.5);cursor:pointer;font-size:11px;font-family:var(--fn);transition:all .15s;white-space:nowrap}
.sb:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85)}
.sb.on{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:500}
.hm{flex:1;display:flex;align-items:center;gap:13px;padding:0 10px;min-width:0}
.pw{display:flex;align-items:center;gap:6px;flex-shrink:0}
.pt{width:74px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
.pf{height:100%;background:var(--gold);border-radius:2px;transition:width .4s}
#pl{font-size:10px;color:rgba(255,255,255,.4);white-space:nowrap}
.dr{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.4);white-space:nowrap;flex-shrink:0}
#sd{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;
padding:2px 6px;border-radius:4px;font-size:11px;font-family:var(--fn)}
#sd:focus{outline:none;border-color:var(--gold)}
.yn{display:flex;align-items:center;gap:2px;padding:0 9px;border-right:1px solid rgba(255,255,255,.1);flex-shrink:0}
.yb{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:16px;padding:2px 5px;border-radius:3px;transition:all .15s}
.yb:hover{color:#fff;background:rgba(255,255,255,.08)}
#yl{font-size:11px;font-weight:500;color:rgba(255,255,255,.6);min-width:28px;text-align:center}
.nts{display:flex;flex-shrink:0}
.nt{padding:0 11px;height:56px;border:none;background:transparent;color:rgba(255,255,255,.45);
cursor:pointer;font-size:12px;font-family:var(--fn);position:relative;transition:color .15s;white-space:nowrap}
.nt:hover{color:rgba(255,255,255,.8)}.nt.on{color:#fff}
.nt.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold)}
.app{min-height:calc(100vh - 56px)}
.vw{display:none;padding:20px}.vw.on{display:block}
.ct{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.ctit{font-family:var(--fs);font-size:19px;font-weight:500;color:var(--navy)}
.leg{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cg{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
@media(max-width:1300px){.cg{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.cg{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){.cg{grid-template-columns:1fr}}
.mc{background:var(--wh);border:1px solid var(--bdr2);border-radius:var(--r);padding:11px}
.mn{font-family:var(--fs);font-size:12px;font-weight:500;color:var(--navy);margin-bottom:7px;text-transform:capitalize}
.mw{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:2px}
.wd{text-align:center;font-size:9px;font-weight:500;color:var(--text3)}
.md{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cd{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:3px}
.cd.cl{cursor:pointer;transition:background .12s}.cd.cl:hover{background:var(--bg2)}
.cd.tod{background:var(--navy)!important}.cd.tod .cn{color:#fff!important;font-weight:600}
.cd.hs{background:var(--blu-bg)}.cd.dn{background:var(--grn-bg)}.cd.dn .cn{color:var(--grn)!important;font-weight:500}
.cd.rst{background:var(--rst)!important;cursor:default!important}.cd.rst .cn{color:var(--rst-t)!important;font-size:8px}
.cd.skp{background:#f5f0ec!important}.cd.skp .cn{color:#c0a898!important}
.cn{font-size:10px;color:var(--text3);line-height:1}.cd.hs:not(.dn) .cn{color:var(--navy)}
.dts{display:flex;gap:2px;margin-top:1px}.dt{width:3px;height:3px;border-radius:50%}
.ds-d{background:var(--navy)}.dn-d{background:var(--grn)}.rv-d{background:var(--org)}
.cd.tod .ds-d{background:rgba(255,255,255,.7)}.rl{font-size:6px;color:var(--rst-t);margin-top:1px}
.lw{max-width:720px;margin:0 auto}
.lt{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ltit{font-family:var(--fs);font-size:18px;font-weight:500;color:var(--navy)}
.dl{display:flex;flex-direction:column;gap:4px}
.di{background:var(--wh);border:1px solid var(--bdr2);border-radius:var(--r);padding:10px 13px;cursor:pointer;
display:flex;align-items:flex-start;gap:10px;transition:border-color .15s,box-shadow .15s}
.di:hover{border-color:#c8d8ee;box-shadow:0 1px 8px rgba(30,58,95,.08)}
.di.dn2{border-left:3px solid var(--grn)}.di.rv2{background:var(--org-bg);border-color:var(--org-bd)}
.di.tod2{border-color:var(--navy);border-width:2px}.di.skp2{background:#f5f0ec;cursor:default;border-color:transparent;opacity:.8}
.dn-b{width:34px;height:34px;background:var(--navy);color:#fff;border-radius:6px;
display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--fs);flex-shrink:0;line-height:1.1}
.dn-b .bn{font-size:16px;font-weight:600}.dn-b .bl{font-size:7px;opacity:.55;letter-spacing:.03em}
.di.dn2 .dn-b{background:var(--grn)}.di.skp2 .dn-b{background:var(--rst-t)}
.di-info{flex:1;min-width:0}.di-dt{font-size:11px;color:var(--text3);margin-bottom:4px}
.di-tgs{display:flex;flex-wrap:wrap;gap:3px}
.tg{padding:2px 7px;border-radius:10px;font-size:11px;white-space:nowrap}
.t-cf{background:#deeaf8;color:#1e3a6a}.t-cc{background:#fdf0e0;color:#7a4a10}
.t-cp{background:#fce8e8;color:#7a2828}.t-cpc{background:#e8f4fd;color:#145680}
.t-cpp{background:#ede8f8;color:#4a2870}.t-eca{background:#e0f5ec;color:#1a5a38}
.t-cdc{background:#e0f0f8;color:#155070}.t-ctn{background:#f0e8f8;color:#4a1870}
.t-lep{background:#fdf0e8;color:#7a3810}.t-lindb{background:#e8f8f4;color:#156050}
.t-esp{background:#f4f0e8;color:#5a4820}.t-adm{background:#e8f0f8;color:#284878}
.t-amb{background:#e4f4e0;color:#1a5018}.t-ele{background:#f0e8f8;color:#481878}
.t-gen{background:var(--bg2);color:var(--text2)}.di-chk{color:var(--grn);font-size:15px;align-self:center;flex-shrink:0}
#ov{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.2);opacity:0;transition:opacity .2s}
#ov.on{display:block;opacity:1}
#dp{position:fixed;top:56px;right:0;bottom:0;width:460px;max-width:97vw;background:var(--wh);
border-left:1px solid var(--bdr);z-index:400;transform:translateX(102%);
transition:transform .24s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;overflow:hidden}
#dp.on{transform:translateX(0)}
#dpi{display:flex;flex-direction:column;height:100%;overflow:hidden;min-height:0}
.ph{padding:14px 15px 12px;border-bottom:1px solid var(--bdr2);display:flex;align-items:flex-start;gap:10px;flex-shrink:0}
.ph-b{width:40px;height:40px;background:var(--navy);color:#fff;border-radius:7px;
display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.ph-b .bn{font-size:17px;font-weight:600;line-height:1;font-family:var(--fs)}
.ph-b .bl{font-size:7px;opacity:.55;letter-spacing:.04em;text-transform:uppercase}
.ph-i{flex:1;min-width:0}.ph-d{font-size:13px;font-weight:500;color:var(--navy)}
.ph-s{font-size:11px;color:var(--text3);margin-top:2px}
.ph-x{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:4px;line-height:1;flex-shrink:0}
.ph-x:hover{color:var(--text)}
.pb{flex:1;overflow-y:auto;overflow-x:hidden;padding:13px 15px 32px;min-height:0}
.ps{margin-bottom:14px}.ps-t{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:7px}
.lc{background:var(--bg);border:1px solid var(--bdr2);border-radius:6px;padding:10px 11px;margin-bottom:6px}
.lc.rv{background:#fff8f0;border-color:var(--org-bd)}
.lc-h{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px}
.lc-a{font-weight:500;font-size:13px;color:var(--navy);font-family:var(--fs)}
.lc-r{font-size:11px;color:var(--text2);font-style:italic}
.rv-badge{display:inline-flex;align-items:center;font-size:9px;font-weight:600;text-transform:uppercase;
letter-spacing:.05em;color:#fff;background:var(--org);padding:2px 6px;border-radius:8px}
.lc-n{font-size:11px;color:var(--text2);margin-bottom:8px}
.lc-bs{display:flex;gap:5px;flex-wrap:wrap}
.btn-r{padding:5px 11px;background:var(--navy);color:#fff;border:none;border-radius:4px;
font-size:11px;font-family:var(--fn);cursor:pointer;transition:background .15s}
.btn-r:hover{background:var(--navy2)}
.btn-p{padding:5px 11px;background:transparent;color:var(--navy);border:1px solid var(--bdr);
border-radius:4px;font-size:11px;font-family:var(--fn);cursor:pointer;text-decoration:none;
display:inline-flex;align-items:center;gap:3px;transition:border-color .15s}
.btn-p:hover{border-color:var(--navy)}
.jc{background:#f0f6e8;border:1px solid #c0d898;border-radius:6px;padding:9px 11px;margin-bottom:6px}
.jchip{display:inline-block;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;
color:#355015;background:rgba(53,80,21,.1);padding:2px 5px;border-radius:8px;margin-bottom:4px}
.rv-sch{background:#fff8f0;border:1px solid var(--org-bd);border-radius:6px;padding:8px 11px;margin-bottom:6px}
.rv-sch-t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--org);margin-bottom:3px}
.rv-sch-d{font-size:12px;color:var(--text);font-weight:500;margin-bottom:3px}
.rv-sch-l{font-size:11px;color:var(--text2)}
.btn-dn{width:100%;padding:10px;border-radius:6px;border:1px dashed var(--bdr);background:transparent;
color:var(--text2);cursor:pointer;font-size:12px;font-family:var(--fn);transition:all .15s;margin-bottom:6px;text-align:center}
.btn-dn:hover{border-color:var(--grn);background:var(--grn-bg);color:var(--grn);border-style:solid}
.btn-dn.mk{border-color:var(--grn);background:var(--grn-bg);color:var(--grn);border-style:solid}
.btn-sk{width:100%;padding:10px;border-radius:6px;border:1px dashed var(--bdr);background:transparent;
color:var(--text3);cursor:pointer;font-size:12px;font-family:var(--fn);transition:all .15s;text-align:center}
.btn-sk:hover{border-color:var(--rst-t);background:var(--rst);color:var(--rst-t);border-style:solid}
.btn-sk.sk{border-color:var(--rst-t);background:var(--rst);color:var(--rst-t);border-style:solid}
#rp{position:fixed;inset:0;top:56px;background:var(--wh);z-index:500;display:none;flex-direction:column}
#rp.on{display:flex}
.rh{padding:12px 18px;border-bottom:1px solid var(--bdr2);display:flex;align-items:center;gap:12px;flex-shrink:0}
.rb2{background:none;border:none;cursor:pointer;color:var(--text2);font-size:18px;padding:4px 7px;border-radius:4px;transition:all .15s}
.rb2:hover{background:var(--bg2);color:var(--navy)}.ri{flex:1;min-width:0}
.rt{font-family:var(--fs);font-size:16px;font-weight:500;color:var(--navy)}
.rr{font-size:11px;color:var(--text2);margin-top:1px}
#rl{padding:6px 12px;background:var(--navy);color:#fff;border:none;border-radius:5px;
font-size:12px;font-family:var(--fn);cursor:pointer;text-decoration:none;white-space:nowrap;transition:background .15s}
#rl:hover{background:var(--navy2)}.rbd{flex:1;overflow:hidden;position:relative}
.rbd iframe{width:100%;height:100%;border:none}
.rld{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
gap:13px;background:var(--bg);font-size:13px;color:var(--text2)}
.sp{width:26px;height:26px;border:3px solid var(--bdr);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#re{display:none;height:100%;align-items:center;justify-content:center}
.re-b{max-width:400px;text-align:center;padding:36px 20px;display:flex;flex-direction:column;align-items:center;gap:12px}
.re-i{font-size:34px;opacity:.3}.re-b h3{font-family:var(--fs);font-size:17px;font-weight:500;color:var(--navy)}
.re-b p{font-size:12px;color:var(--text2);line-height:1.6}
.btn-op{padding:9px 18px;background:var(--navy);color:#fff;border:none;border-radius:5px;
font-size:13px;font-family:var(--fn);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px;transition:background .15s}
.btn-sum{display:inline-flex;align-items:center;gap:6px;padding:0 13px;height:56px;
border:none;background:transparent;color:rgba(255,255,255,.45);cursor:pointer;
font-size:12px;font-family:var(--fn);text-decoration:none;white-space:nowrap;flex-shrink:0;
position:relative;transition:color .15s;}
.btn-sum:hover{color:rgba(255,255,255,.8);}
.btn-sum::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold);transform:scaleX(0);transition:transform .15s;}
.btn-sum:hover::after{transform:scaleX(1);}
.btn-sum svg{flex-shrink:0;}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}</style>
</head>

<script>
const L={
cf:{a:'CF/88',n:'Constituição Federal',url:'https://www.planalto.gov.br/ccivil_03/constituicao/constituicao.htm',c:'cf'},
cc:{a:'CC',n:'Código Civil',url:'https://www.planalto.gov.br/ccivil_03/leis/2002/l10406compilada.htm',c:'cc'},
cp:{a:'CP',n:'Código Penal',url:'https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848compilado.htm',c:'cp'},
cpc:{a:'CPC',n:'Código de Processo Civil',url:'https://www.planalto.gov.br/ccivil_03/_ato2015-2018/2015/lei/l13105.htm',c:'cpc'},
cpp:{a:'CPP',n:'Código de Processo Penal',url:'https://www.planalto.gov.br/ccivil_03/decreto-lei/del3689compilado.htm',c:'cpp'},

// ═══ CORE ═══════════════════════════════════════════════════════════════════
function getS(){
  if(cS===30)return S30; if(cS===40)return S40;
  if(cS===80)return S80; if(cS===180)return S180;
  return SMAG;
}
function getCfg(){return SCFG[cS]||SCFG[40];}
function dkStr(d){return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();}
function dKey(n){return ''+cS+'_'+n;}
function skKey(n){return 'sk_'+cS+'_'+n;}

let cS=40,cY=new Date().getFullYear(),cV='calendar';
let startDate=null,done={},skips={};

const MN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const WD=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const TODAY=new Date();TODAY.setHours(0,0,0,0);

function addDay(d){var r=new Date(d);r.setDate(r.getDate()+1);return r;}

// ── buildSlots ──────────────────────────────────────────────────────────────
// Returns ordered array of calendar dates (one per study day).
// Rules:
//   1. Saturdays are auto-skipped (rest) when cfg.hasSat===true
//   2. If user skipped study day N, insert ONE extra rest day before placing day N.
//      This shifts day N and all subsequent days forward by 1 calendar day.
// The 'consumed' set prevents the same skip from consuming more than 1 rest day.
function buildSlots(){
  if(!startDate)return[];
  var cfg=getCfg(),S=getS(),slots=[],cal=new Date(startDate),consumed={};
  for(var studyIdx=0,guard=0;studyIdx<S.length&&guard<100000;guard++){
    // Auto-rest Saturday
    if(cfg.hasSat&&cal.getDay()===6){cal=addDay(cal);continue;}
    // User-skip: insert 1 rest day before this study slot
    if(skips[skKey(studyIdx+1)]&&!consumed[studyIdx]){
      consumed[studyIdx]=true;
      cal=addDay(cal);
      continue; // same studyIdx, next cal day
    }
    // Place study day
    slots.push(new Date(cal));
    studyIdx++;
    cal=addDay(cal);
  }
  return slots;
}

function buildDateMap(slots){
  var map={};
  (slots||buildSlots()).forEach(function(d,i){map[dkStr(d)]=i+1;});
  return map;
}

// ── Review map ──────────────────────────────────────────────────────────────
// For every study day, compute +1, +7, +30 calendar days from its SCHEDULED date.
// These become review dates (shown regardless of done status).
function buildRevMap(slots){
  var S=getS(),map={};
  (slots||buildSlots()).forEach(function(dt,i){
    [[1,'24h'],[7,'7 dias'],[30,'30 dias']].forEach(function(pair){
      var off=pair[0],type=pair[1];
      var rd=new Date(dt);rd.setDate(rd.getDate()+off);
      var dk=dkStr(rd);
      if(!map[dk])map[dk]=[];
      map[dk].push({dayNum:i+1,type:type,laws:S[i]});
    });
  });
  return map;
}

function getJuris(dt){
  if(!getCfg().hasJur)return null;
  return JDW[dt.getDay()]||null;
}
function fmtDate(dt){return WD[dt.getDay()]+', '+dt.getDate()+' de '+MN[dt.getMonth()].toLowerCase();}

function saveState(){
  try{localStorage.setItem('ld_v6',JSON.stringify({done:done,skips:skips,start:startDate?startDate.toISOString():null}));}catch(e){}
}
function loadState(){
  try{
    var raw=localStorage.getItem('ld_v6');
    if(raw){var s=JSON.parse(raw);done=s.done||{};skips=s.skips||{};startDate=s.start?new Date(s.start):null;}
  }catch(e){done={};skips={};}
  var el=document.getElementById('sd');
  if(startDate){
    el.value=startDate.getFullYear()+'-'+pad(startDate.getMonth()+1)+'-'+pad(startDate.getDate());
  }else{
    var t=new Date();
    el.value=t.getFullYear()+'-'+pad(t.getMonth()+1)+'-'+pad(t.getDate());
    applyStart(el.value);
  }
}
function pad(n){return n<10?'0'+n:''+n;}
function applyStart(v){
  if(!v)return;
  var p=v.split('-');startDate=new Date(+p[0],+p[1]-1,+p[2]);
  saveState();renderAll();
}

// ═══ RENDER ══════════════════════════════════════════════════════════════════
function renderAll(){renderProgress();if(cV==='calendar')renderCal();else renderList();}

function renderProgress(){
  var S=getS(),n=0,i;
  for(i=0;i<S.length;i++){if(done[dKey(i+1)])n++;}
  var pct=S.length?Math.round(n/S.length*100):0;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pl').textContent=n+'/'+S.length;
}

// ── Calendar ─────────────────────────────────────────────────────────────────
function renderCal(){
  document.getElementById('ctit').textContent='Calendário '+cY;
  var g=document.getElementById('cg');g.innerHTML='';
  var slots=buildSlots(),dmap=buildDateMap(slots),rmap=buildRevMap(slots),cfg=getCfg();
  var WDS=['D','S','T','Q','Q','S','S'];
  for(var m=0;m<12;m++){
    var first=new Date(cY,m,1),last=new Date(cY,m+1,0);
    var card=document.createElement('div');card.className='mc';
    var wdh=WDS.map(function(w,i){return '<div class="wd" style="'+(i===6?'color:#d4a0a0;font-size:8px':'')+'">'+ w+'</div>';}).join('');
    card.innerHTML='<div class="mn">'+MN[m]+'</div><div class="mw">'+wdh+'</div><div class="md" id="mg'+m+'"></div>';
    g.appendChild(card);
    var dg=card.querySelector('#mg'+m);
    for(var b=0;b<first.getDay();b++){var bl=document.createElement('div');bl.className='cd';dg.appendChild(bl);}
    for(var day=1;day<=last.getDate();day++){
      (function(day){
        var dt=new Date(cY,m,day),dk=dkStr(dt);
        var dn=dmap[dk]||0,revs=rmap[dk]||[];
        var isToday=dt.getTime()===TODAY.getTime();
        var isSat=cfg.hasSat&&dt.getDay()===6;
        var isSkip=dn&&skips[skKey(dn)];
        var isDone=dn&&done[dKey(dn)];
        var hasS=!!dn&&!isSat&&!isSkip;
        var el=document.createElement('div');
        var cls='cd';
        if(isSat)cls+=' rst';
        else if(isSkip)cls+=' skp';
        else if(isToday)cls+=' tod';
        else if(isDone)cls+=' dn';
        else if(hasS)cls+=' hs';
        if(hasS||(!isSat&&revs.length))cls+=' cl';
        var dots='';
        if(hasS&&!isDone)dots+='<div class="dt ds-d"></div>';
        if(isDone)dots+='<div class="dt dn-d"></div>';
        if(revs.length&&!isSat&&!isSkip)dots+='<div class="dt rv-d"></div>';
        var inner='<div class="cn">'+day+'</div>';
        if(dots)inner+='<div class="dts">'+dots+'</div>';
        if(isSat)inner+='<div class="rl">dsc</div>';
        if(isSkip)inner+='<div class="rl">skip</div>';
        el.className=cls;el.innerHTML=inner;
        if(dn&&!isSat){el.onclick=function(){openPanel(dn);};}
        else if(revs.length&&!isSat){el.onclick=function(){openPanel(revs[0].dayNum);};}
        dg.appendChild(el);
      })(day);
    }
  }
}

// ── List ──────────────────────────────────────────────────────────────────────
function renderList(){
  var cfg=getCfg();
  document.getElementById('ltit').textContent='Cronograma — '+cfg.label;
  var S=getS(),slots=buildSlots(),n=0,i;
  for(i=0;i<S.length;i++){if(done[dKey(i+1)])n++;}
  document.getElementById('lp').textContent=n+'/'+S.length+' concluídos';
  var container=document.getElementById('dl');container.innerHTML='';
  var rmap=buildRevMap(slots);
  var todayRevs=rmap[dkStr(TODAY)]||[];
  if(todayRevs.length){
    var h=document.createElement('div');
    h.innerHTML='<div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--org);margin:4px 0 7px">Revisões de hoje</div>';
    container.appendChild(h);
    var seen={};
    todayRevs.forEach(function(r){if(!seen[r.dayNum]){seen[r.dayNum]=1;container.appendChild(buildItem(r.dayNum,S[r.dayNum-1],true,r.type,slots));}});
    var sep=document.createElement('div');sep.style.cssText='height:1px;background:var(--bdr2);margin:10px 0';container.appendChild(sep);
  }
  for(i=0;i<S.length;i++){container.appendChild(buildItem(i+1,S[i],false,null,slots));}
}

function lawTags(laws){
  return(laws||[]).filter(function(e){return L[e[0]];}).map(function(e){
    var law=L[e[0]];return '<span class="tg '+(TC[law.c]||'t-gen')+'">'+law.a+(e[1]&&e[1]!=='integral'?' '+e[1]:'')+'</span>';
  }).join('');
}

function buildItem(n,laws,isRev,revType,slots){
  var isDone=!!done[dKey(n)],isSkip=!!skips[skKey(n)];
  var dt=slots?slots[n-1]:buildSlots()[n-1];
  var isToday=dt&&dt.getTime()===TODAY.getTime();
  var el=document.createElement('div');
  var cls='di';
  if(isDone)cls+=' dn2';if(isRev)cls+=' rv2';
  if(isToday&&!isRev)cls+=' tod2';if(isSkip)cls+=' skp2';
  el.className=cls;
  var dateStr=dt?fmtDate(dt):'';
  el.innerHTML='<div class="dn-b"><span class="bn">'+n+'</span><span class="bl">dia</span></div>'+
    '<div class="di-info"><div class="di-dt">'+dateStr+(isSkip?' — descanso':'')+(revType?' — Revisão '+revType:'')+'</div>'+
    '<div class="di-tgs">'+lawTags(laws)+'</div></div>'+(isDone?'<div class="di-chk">✓</div>':'');
  el.onclick=function(){if(!isSkip)openPanel(n);};
  return el;
}

// ═══ PANEL ═══════════════════════════════════════════════════════════════════
function makeLcHtml(k,r,rvLabel){
  var law=L[k];if(!law)return'';
  var rvBadge=rvLabel?'<span class="rv-badge">'+rvLabel+'</span> ':'';
  return '<div class="lc'+(rvLabel?' rv':'')+'">'+
    '<div class="lc-h">'+rvBadge+'<span class="lc-a">'+law.a+'</span>'+
    '<span class="lc-r">'+(r&&r!=='integral'?'Arts. '+r:'Integral')+'</span></div>'+
    '<div class="lc-n">'+law.n+'</div>'+
    '<div class="lc-bs">'+
      '<button class="btn-r" onclick="openReader(\''+k+'\',\''+r+'\')">Ler texto</button>'+
      '<a class="btn-p" href="'+law.url+'" target="_blank">Planalto ↗</a>'+
    '</div></div>';
}

function openPanel(n){
  var S=getS();if(!S[n-1])return;
  var cfg=getCfg(),slots=buildSlots(),rmap=buildRevMap(slots);
  var dt=slots[n-1];
  var isDone=!!done[dKey(n)],isSkip=!!skips[skKey(n)];

  // 1. Jurisprudência header
  var jtext=dt?getJuris(dt):null;
  var jHtml=jtext?'<div class="ps"><div class="ps-t">Jurisprudência do dia</div>'+
    '<div class="jc"><span class="jchip">'+jtext+'</span>'+
    '<div style="font-size:12px;color:var(--text2);margin-top:4px">Consultar informativos, súmulas e teses conforme indicado</div>'+
    '<div style="margin-top:9px"><a href="https://joomiguellr.github.io/SUMULAS-REPETITIVOS/" target="_blank" rel="noopener" class="btn-r" style="display:inline-flex;align-items:center;gap:5px;text-decoration:none;font-size:11px">'+
    '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>'+
    'Súmulas e Repetitivos ↗</a></div>'+
    '</div></div>':'';

  // 2. Leituras do dia = regular laws + due reviews (merged)
  var todayDk=dt?dkStr(dt):'_none_';
  var revsDue=(rmap[todayDk]||[]).filter(function(r){return r.dayNum!==n;});

  var readHtml='';
  // Regular study laws
  (S[n-1]||[]).forEach(function(e){if(L[e[0]])readHtml+=makeLcHtml(e[0],e[1],'');});
  // Review laws due today (integrated in same section)
  revsDue.forEach(function(rv){
    (rv.laws||[]).forEach(function(e){
      if(L[e[0]])readHtml+=makeLcHtml(e[0],e[1],'Revisão '+rv.type+' — Dia '+rv.dayNum);
    });
  });
  var hasRevsDue=revsDue.length>0;

  // 3. Future reviews schedule
  var futHtml='';
  if(dt){
    futHtml='<div class="ps"><div class="ps-t">Agenda de revisões — Dia '+n+'</div>';
    [[1,'24h'],[7,'7 dias'],[30,'30 dias']].forEach(function(pair){
      var off=pair[0],type=pair[1];
      var rd=new Date(dt);rd.setDate(rd.getDate()+off);
      var lawNames=(S[n-1]||[]).filter(function(e){return L[e[0]];})
        .map(function(e){return L[e[0]].a+(e[1]&&e[1]!=='integral'?' '+e[1]:'');}).join(' · ');
      futHtml+='<div class="rv-sch">'+
        '<div class="rv-sch-t">Revisão '+type+'</div>'+
        '<div class="rv-sch-d">'+fmtDate(rd)+'</div>'+
        '<div class="rv-sch-l">'+lawNames+'</div></div>';
    });
    futHtml+='</div>';
  }

  document.getElementById('dpi').innerHTML=
    '<div class="ph">'+
      '<div class="ph-b"><span class="bn">'+n+'</span><span class="bl">dia</span></div>'+
      '<div class="ph-i">'+
        '<div class="ph-d">Dia '+n+(dt?' — '+fmtDate(dt):'')+'</div>'+
        '<div class="ph-s">'+cfg.label.split(' — ')[0]+' · '+((S[n-1]||[]).filter(function(e){return L[e[0]];}).length)+' matérias'+(hasRevsDue?' + revisões':'')+(isSkip?' · Descanso':'')+'</div>'+
      '</div>'+
      '<button class="ph-x" onclick="closePanel()">×</button>'+
    '</div>'+
    '<div class="pb">'+
      jHtml+
      '<div class="ps"><div class="ps-t">Leituras do dia'+(hasRevsDue?' + revisões pendentes':'')+'</div>'+readHtml+'</div>'+
      futHtml+
      '<button class="btn-dn '+(isDone?'mk':'')+'" onclick="toggleDone('+n+')">'+(isDone?'✓ Concluído — clique para desfazer':'Marcar dia como concluído')+'</button>'+
      '<button class="btn-sk '+(isSkip?'sk':'')+'" onclick="toggleSkip('+n+')">'+(isSkip?'↩ Desfazer descanso':'Pular dia (descanso)')+'</button>'+
    '</div>';

  document.getElementById('ov').classList.add('on');
  document.getElementById('dp').classList.add('on');
}

function closePanel(){document.getElementById('ov').classList.remove('on');document.getElementById('dp').classList.remove('on');}

function toggleDone(n){
  var k=dKey(n);
  if(done[k])delete done[k];else done[k]=new Date().toISOString();
  saveState();openPanel(n);renderProgress();
  if(cV==='calendar')renderCal();else renderList();
}
function toggleSkip(n){
  var sk=skKey(n);
  if(skips[sk])delete skips[sk];else skips[sk]=true;
  saveState();
  // Rebuild panel with updated slots, then refresh calendar/list
  openPanel(n);renderAll();
}

// ═══ READER ══════════════════════════════════════════════════════════════════
function openReader(k,r){
  var law=L[k];if(!law)return;
  document.getElementById('rt').textContent=law.a+' — '+law.n;
  document.getElementById('rr').textContent=r&&r!=='integral'?'Arts. '+r:'Texto integral';
  document.getElementById('rl').href=law.url;document.getElementById('rel').href=law.url;
  var rld=document.getElementById('rld'),rif=document.getElementById('rif'),re=document.getElementById('re');
  rld.style.display='flex';rif.style.display='none';re.style.display='none';
  document.getElementById('rp').classList.add('on');
  rif.src=law.url;
  rif.onload=function(){try{var _=rif.contentDocument;rld.style.display='none';rif.style.display='block';}catch(e){showRE();}};
  rif.onerror=showRE;
  setTimeout(function(){if(rld.style.display!=='none')showRE();},7000);
}
function showRE(){document.getElementById('rld').style.display='none';document.getElementById('rif').style.display='none';document.getElementById('re').style.display='flex';}
function closeReader(){document.getElementById('rp').classList.remove('on');document.getElementById('rif').src='about:blank';}

// ═══ EVENTS ══════════════════════════════════════════════════════════════════
document.querySelectorAll('.sb').forEach(function(btn){
  btn.onclick=function(){
    cS=isNaN(+btn.dataset.d)?btn.dataset.d:+btn.dataset.d;
    document.querySelectorAll('.sb').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');
    renderAll();
  };
});
document.querySelectorAll('.nt').forEach(function(btn){
  btn.onclick=function(){
    cV=btn.dataset.v;
    document.querySelectorAll('.nt').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');
    document.querySelectorAll('.vw').forEach(function(v){v.classList.remove('on');});
    document.getElementById('view-'+cV).classList.add('on');renderAll();
  };
});
document.getElementById('sd').onchange=function(e){applyStart(e.target.value);};
document.getElementById('yp').onclick=function(){cY--;document.getElementById('yl').textContent=cY;if(cV==='calendar')renderCal();};
document.getElementById('yn2').onclick=function(){cY++;document.getElementById('yl').textContent=cY;if(cV==='calendar')renderCal();};
document.getElementById('yl').textContent=cY;
loadState();renderAll();

</script>
</body>
</html>
